---
# playbook.yml -- Composite playbook for web-server-setup
# Generated by AnsibleClaw (compose)
#
# Usage:
#   ansible-playbook assets/playbook.yml -i /path/to/inventory.yml --check --diff
#   ansible-playbook assets/playbook.yml -i /path/to/inventory.yml --diff
#
- name: "Deploy and Configure Nginx Web Server"
  hosts: all
  become: true
  collections:
    - ansible.posix
  tasks:
    - name: "Install Nginx package"
      ansible.builtin.package:
        name: "nginx"
        state: "present"

    - name: "Template index.html to Nginx docroot"
      ansible.builtin.template:
        src: "index.html.j2"
        dest: "/usr/share/nginx/html/index.html"
        mode: '0644'

    - name: "Start and enable Nginx service"
      ansible.builtin.service:
        name: "nginx"
        state: "started"
        enabled: yes

    - name: "Allow HTTP traffic in firewalld"
      ansible.posix.firewalld:
        service: http
        permanent: true
        immediate: true
        state: enabled

